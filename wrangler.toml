# Cloudflare Pages + KV config
# KV ID'leri Pages Dashboard > Settings > Functions'tan alınacak

name = "supplement-arena"
compatibility_date = "2026-01-01"
pages_build_output_dir = "./dist"

# KV namespace binding
# Dashboard'dan ID'leri aldıktan sonra buraya yaz
[[kv_namespaces]]
binding = "SUPPLEMENT_KV"
id = "REPLACE_WITH_REAL_KV_ID"
preview_id = "REPLACE_WITH_PREVIEW_KV_ID"
